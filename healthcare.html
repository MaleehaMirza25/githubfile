<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediScan AI Assistant</title>
    <style>
        /* CSS - The Look and Feel */
        :root {
            --primary: #0052cc;
            --accent: #00d1b2;
            --bg: #f4f7f9;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e1e8ed;
        }

        header {
            background: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        header h2 { margin: 0; font-size: 1.5rem; }
        
        .ai-badge {
            background: var(--accent);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            vertical-align: middle;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #fff;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .bot-msg {
            background: #f0f2f5;
            color: var(--text);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .user-msg {
            background: var(--primary);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .input-area {
            display: flex;
            padding: 20px;
            background: #f9f9f9;
            border-top: 1px solid #eee;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            padding-left: 20px;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            margin-left: 10px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.1); }

        .disclaimer {
            font-size: 0.7rem;
            color: #999;
            padding: 10px;
            text-align: center;
            background: #fff;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <header>
            <h2>MediScan <span class="ai-badge">AI LIVE</span></h2>
            <p style="font-size: 0.8rem; opacity: 0.8; margin-top: 5px;">Virtual Triage Assistant</p>
        </header>
        
        <div id="chat-box" class="chat-box">
            <div class="message bot-msg">Hello. I am the MediScan AI. Please describe your symptoms or ask a health question.</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Try 'I have a headache'..." onkeypress="handleKeyPress(event)">
            <button onclick="analyzeSymptoms()">➔</button>
        </div>
        
        <footer class="disclaimer">
            NOT FOR EMERGENCIES. If you are in immediate danger, call local emergency services.
        </footer>
    </div>

    <script>
        /* JavaScript - The "Brain" */
        const knowledgeBase = {
            "headache": "If it's a tension headache, rest and hydration help. If it's a 'thunderclap' (sudden and severe), seek immediate care.",
            "fever": "A fever is usually a sign of infection. Drink fluids and rest. If it stays above 103°F (39.4°C), call a doctor.",
            "chest pain": "URGENT: Chest pain can indicate cardiac issues. Please contact emergency services immediately.",
            "cough": "Common for colds. If you have difficulty breathing or a high fever, get a clinical evaluation.",
            "stomach": "Could be indigestion or a virus. Avoid solid foods for a few hours and stay hydrated.",
            "hello": "Hello! I am ready to assist with a preliminary symptom check. How are you feeling?",
            "hi": "Hi there! How can I help you today?"
        };

        function handleKeyPress(e) {
            if (e.key === 'Enter') analyzeSymptoms();
        }

        function analyzeSymptoms() {
            const inputField = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const userInput = inputField.value.trim().toLowerCase();

            if (userInput === "") return;

            // 1. Add User Message
            appendMessage(userInput, 'user-msg');
            inputField.value = "";

            // 2. Process Response
            let response = "I'm processing that. While I recognize some keywords, I recommend consulting a doctor for a definitive diagnosis.";
            
            // Keyword matching logic
            for (let key in knowledgeBase) {
                if (userInput.includes(key)) {
                    response = knowledgeBase[key];
                    break;
                }
            }

            // 3. Add AI Response with a fake "thinking" delay
            setTimeout(() => {
                appendMessage(response, 'bot-msg');
            }, 600);
        }

        function appendMessage(text, className) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            
            // Auto-scroll to bottom
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
